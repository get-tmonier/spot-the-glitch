name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Format
        run: bun run format

      - name: Lint
        run: bun run lint

      - name: FSD boundaries
        run: bun run fsd

      - name: Dead code
        run: bun run knip

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
